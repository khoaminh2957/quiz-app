<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="description" content="Quiz nhanh — 286 câu Python ngẫu nhiên hoặc tuần tự.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quiz nhanh — Python</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<a class="skip-link" href="#main">Bỏ qua tới nội dung</a>
<header class="topbar">
  <h1>Quiz Review Code <span class="lang-pill lang-python">Python</span></h1>
  <nav class="navlinks">
    <a href="/">Trang chủ</a>
    <a href="/quiz" class="active">Quiz nhanh</a>
    <a href="/lang/python/roadmap">Lộ trình</a>
    <a href="/lang/python/mastery">Mức độ thành thạo</a>
    <a href="/review">Xem lại</a>
  </nav>
  <div class="meta">
    <span id="progress">0 / {{ total }}</span>
    <span id="score">đúng 0/0</span>
    <button id="theme-toggle" type="button" aria-label="Chuyển sáng/tối" title="Chuyển sáng/tối"><span aria-hidden="true">🌓</span></button>
    <button id="reset" type="button" aria-label="Reset tiến độ" title="Reset tiến độ">Reset</button>
  </div>
</header>

<section class="controls">
  <label>Chế độ:
    <select id="mode">
      <option value="seq">Tuần tự</option>
      <option value="rand">Ngẫu nhiên</option>
      <option value="review">Ôn lại</option>
    </select>
  </label>
  <label>Chủ đề:
    <select id="filter-topic"><option value="">tất cả</option></select>
  </label>
  <label>Độ khó:
    <select id="filter-diff"><option value="">tất cả</option></select>
  </label>
  <span class="loaded">Đang load <span id="filtered-count">0</span> câu phù hợp</span>
</section>

<main id="main" tabindex="-1">
<section id="quiz">
  <div id="question-card" class="card">
    <div class="qmeta">
      <span id="q-lang"></span>
      <span id="q-topic"></span>
      <span id="q-diff"></span>
      <span id="q-idx"></span>
    </div>
    <pre class="code"><code id="q-code"></code><button class="copy-btn" id="copy-code" type="button" aria-label="Copy đoạn code" title="Copy code"><span aria-hidden="true">⧉</span></button></pre>
    <p id="q-question"></p>
    <form id="q-options"></form>
    <div class="actions">
      <button id="submit-btn" type="button">Nộp</button>
      <button id="back-btn" type="button">Quay lại (B)</button>
      <button id="next-btn" type="button">Tiếp (→)</button>
    </div>
    <div id="feedback" class="hidden" role="status" aria-live="polite"></div>
  </div>

  <div id="pager">
    <button class="page-btn" data-dir="-1" type="button">◀ 50 trước</button>
    <span id="page-info"></span>
    <button class="page-btn" data-dir="+1" type="button">50 sau ▶</button>
  </div>
</section>
</main>

<footer><small>Phím tắt khi tuần tự: <kbd>1-4</kbd> chọn, <kbd>Enter</kbd> nộp, <kbd>→</kbd> tiếp, <kbd>B</kbd> lùi, <kbd>R</kbd> random; bỏ qua khi đang focus vào input.</small></footer>

<script src="/static/prism.js"></script>
<script src="/static/quiz.js"></script>
</body>
</html>
